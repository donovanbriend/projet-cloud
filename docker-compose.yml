services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notes_user
      POSTGRES_PASSWORD: notes_pass
      POSTGRES_DB: notes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_user -d notes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://notes_user:notes_pass@postgres:5432/notes_db
      JWT_SECRET: dev-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy

  notes-service:
    build: ./notes-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://notes_user:notes_pass@postgres:5432/notes_db
      AUTH_SERVICE_URL: http://auth-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started

volumes:
  pgdata:
